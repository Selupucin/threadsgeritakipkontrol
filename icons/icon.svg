<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.55" stop-color="#5b7cff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="yarn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8fb3"/>
      <stop offset="1" stop-color="#ff5c8a"/>
    </linearGradient>
  </defs>

  <!-- arka plan -->
  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#bg)"/>

  <!-- kulaklar -->
  <path d="M36 50 L30 20 L60 40 Z" fill="#fdf6ff"/>
  <path d="M92 50 L98 20 L68 40 Z" fill="#fdf6ff"/>
  <path d="M40 46 L37 30 L52 41 Z" fill="#ff9bc4"/>
  <path d="M88 46 L91 30 L76 41 Z" fill="#ff9bc4"/>

  <!-- yüz -->
  <ellipse cx="64" cy="70" rx="38" ry="34" fill="#fdf6ff"/>

  <!-- yanak allığı -->
  <circle cx="42" cy="80" r="7" fill="#ff9bc4" opacity="0.75"/>
  <circle cx="86" cy="80" r="7" fill="#ff9bc4" opacity="0.75"/>

  <!-- gözler (tatlı, parlak) -->
  <circle cx="51" cy="68" r="6.5" fill="#2b2b3a"/>
  <circle cx="77" cy="68" r="6.5" fill="#2b2b3a"/>
  <circle cx="53" cy="66" r="2.1" fill="#ffffff"/>
  <circle cx="79" cy="66" r="2.1" fill="#ffffff"/>

  <!-- burun + ağız -->
  <path d="M60 78 L68 78 L64 83 Z" fill="#ff5c8a"/>
  <path d="M64 83 Q59 89 54 85 M64 83 Q69 89 74 85" fill="none" stroke="#2b2b3a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- bıyıklar -->
  <g stroke="#cfd3dd" stroke-width="2" stroke-linecap="round">
    <line x1="22" y1="70" x2="40" y2="72"/>
    <line x1="20" y1="80" x2="40" y2="79"/>
    <line x1="106" y1="70" x2="88" y2="72"/>
    <line x1="108" y1="80" x2="88" y2="79"/>
  </g>

  <!-- ip yumağı (marka detayı) -->
  <g transform="translate(95 99)">
    <circle r="15" fill="url(#yarn)"/>
    <g stroke="#ffffff" stroke-width="1.6" opacity="0.85" fill="none">
      <path d="M-12 -4 Q0 -14 12 -3"/>
      <path d="M-13 3 Q0 -6 13 4"/>
      <path d="M-9 10 Q2 2 11 11"/>
      <path d="M-4 -13 Q6 0 -2 13"/>
      <path d="M5 -13 Q-3 0 7 12"/>
    </g>
  </g>
</svg>
